name: Bug report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check that the service is running (`/health`) and that your config is valid.

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect vs. what actually happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Call ...
        3. See ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SerenWorkbench version
      placeholder: "e.g. v0.2.0  (pip show seren-workbench)"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.9"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text
