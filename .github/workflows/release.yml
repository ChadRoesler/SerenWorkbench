name: Build & Release

on:
  push:
    branches: ["**"]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    name: "Test py${{ matrix.python-version }} [${{ matrix.extras }}]"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        # SCC has NO [vector] extra by design (it embeds nothing - RRF over
        # ranks, never magnitudes). So the real surface is these four, not
        # eight: base, +mcp, +corp, +both.
        extras: ["dev"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history + tags

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and deps (extras = ${{ matrix.extras }})
        run: pip install -e ".[${{ matrix.extras }}]"
        working-directory: SerenWorkbench
        env:
          # Tests don't care about the real version; pin one so scm never has
          # to compute from history (and so a tagless branch can't trip it).
          SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"

      - name: Run tests
        run: python -m pytest tests/ -v
        working-directory: SerenWorkbench

  build-and-release:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm derives the version from the tag graph

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build
        working-directory: SerenCorpusCallosum

      - name: Upload dist as artifact (handed to the publish job)
        uses: actions/upload-artifact@v4
        with:
          name: seren-workbench-dist
          path: SerenWorkbench/dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SerenWorkbench/dist/*

  pypi-publish:
    needs: [build-and-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/seren-workbench
    permissions:
      id-token: write   # MANDATORY for Trusted Publishing; job-level = least privilege
    steps:
      - name: Download the built dist
        uses: actions/download-artifact@v4
        with:
          name: seren-workbench-dist
          path: dist/

      - name: Publish to PyPI (tokenless)
        uses: pypa/gh-action-pypi-publish@release/v1